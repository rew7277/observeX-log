{% extends "base.html" %}
{% block title %}Forgot Password · ObserveX{% endblock %}
{% block body %}
<div style="min-height:100vh;display:grid;place-items:center;background:var(--bg)">
  <div style="width:100%;max-width:420px;padding:24px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:40px;margin-bottom:10px">🔑</div>
      <div style="font-size:22px;font-weight:700">Forgot password?</div>
      <div style="color:var(--tx3);font-size:13px;margin-top:4px">We'll email you a reset link</div>
    </div>

    <div class="card" style="padding:28px">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom:20px">
          <label class="lbl">Email address</label>
          <input class="input" type="email" name="email" placeholder="you@company.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Send reset link</button>
      </form>
      <p style="text-align:center;margin-top:18px;font-size:13px">
        <a href="{{ url_for('login') }}" style="color:var(--tx3)">← Back to login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
