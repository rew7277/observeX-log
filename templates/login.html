{% extends "base.html" %}
{% block title %}Login · ObserveX{% endblock %}
{% block body %}
<div style="min-height:100vh;display:grid;place-items:center;background:var(--bg);position:relative;overflow:hidden">
  <!-- Background glow -->
  <div style="position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(90,94,247,.15) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none"></div>

  <div style="width:100%;max-width:420px;padding:24px">
    <!-- Brand -->
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--grad);display:inline-grid;place-items:center;font-size:26px;box-shadow:0 12px 40px rgba(90,94,247,.4);margin-bottom:14px">🔭</div>
      <div style="font-size:24px;font-weight:700;letter-spacing:-.03em">ObserveX</div>
      <div style="color:var(--tx3);font-size:13px;margin-top:4px">Log Intelligence Platform</div>
    </div>

    <div class="card" style="padding:28px">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">Welcome back</h2>
      <p style="color:var(--tx2);font-size:13px;margin-bottom:24px">Sign in to your workspace</p>

      <form method="POST">
        <div style="margin-bottom:16px">
          <label class="lbl">Email</label>
          <input class="input" type="email" name="email" placeholder="you@company.com" required autofocus>
        </div>
        <div style="margin-bottom:20px">
          <label class="lbl">Password</label>
          <input class="input" type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Sign in →</button>
      </form>

      <div style="display:flex;justify-content:space-between;margin-top:18px;font-size:13px">
        <a href="{{ url_for('forgot_password') }}" style="color:var(--tx3)">Forgot password?</a>
        <a href="{{ url_for('register') }}">Create account</a>
      </div>
    </div>

    <p style="text-align:center;color:var(--tx3);font-size:12px;margin-top:20px">© 2025 ObserveX · Log Intelligence SaaS</p>
  </div>
</div>
{% endblock %}
