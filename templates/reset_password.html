{% extends "base.html" %}
{% block title %}Reset Password · ObserveX{% endblock %}
{% block body %}
<div style="min-height:100vh;display:grid;place-items:center;background:var(--bg)">
  <div style="width:100%;max-width:420px;padding:24px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:40px;margin-bottom:10px">🔒</div>
      <div style="font-size:22px;font-weight:700">Set new password</div>
      <div style="color:var(--tx3);font-size:13px;margin-top:4px">Choose a strong password</div>
    </div>

    <div class="card" style="padding:28px">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="margin-bottom:14px">
          <label class="lbl">New password</label>
          <input class="input" type="password" name="password" placeholder="Min 8 characters" minlength="8" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Update password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
